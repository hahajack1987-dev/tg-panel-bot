<script>

let profiles = JSON.parse(localStorage.getItem("profiles") || "{}");

function updateSelect() {
    let select = document.getElementById("profileSelect");
    select.innerHTML = "";

    let keys = Object.keys(profiles);

    if (keys.length === 0) return;

    keys.forEach(name => {
        let opt = document.createElement("option");
        opt.value = name;
        opt.innerText = name;
        select.appendChild(opt);
    });

    select.value = keys[0];
    loadProfile(keys[0]);
}

function newProfile() {
    let name = prompt("Profil adı:");
    if (!name) return;

    profiles[name] = {
        token: "",
        chatId: "",
        messages: "",
        delay: 3
    };

    localStorage.setItem("profiles", JSON.stringify(profiles));
    updateSelect();
}

function saveProfile() {
    let name = document.getElementById("profileSelect").value;
    if (!name) return;

    profiles[name] = {
        token: document.getElementById("token").value || "",
        chatId: document.getElementById("chatId").value || "",
        messages: document.getElementById("messages").value || "",
        delay: document.getElementById("delay").value || 3
    };

    localStorage.setItem("profiles", JSON.stringify(profiles));
    alert("Kaydedildi");
}

function deleteProfile() {
    let name = document.getElementById("profileSelect").value;
    if (!name) return;

    delete profiles[name];

    localStorage.setItem("profiles", JSON.stringify(profiles));
    updateSelect();
}

function loadProfile(name) {
    let p = profiles[name];
    if (!p) return;

    document.getElementById("token").value = p.token || "";
    document.getElementById("chatId").value = p.chatId || "";
    document.getElementById("messages").value = p.messages || "";
    document.getElementById("delay").value = p.delay || 3;
}

document.getElementById("profileSelect").onchange = function() {
    loadProfile(this.value);
};

async function startBot() {
    try {
        let res = await fetch("/api/start", {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify({
                token: document.getElementById("token").value,
                chatId: document.getElementById("chatId").value,
                messages: document.getElementById("messages").value,
                delay: document.getElementById("delay").value
            })
        });

        console.log(await res.text());
    } catch (e) {
        console.error(e);
    }
}

async function stopBot() {
    try {
        await fetch("/api/stop", { method: "POST" });
    } catch (e) {
        console.error(e);
    }
}

updateSelect();

</script>
