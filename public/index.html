<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Telegram Bot Panel + Profil</title>

<style>
body {
    font-family: Arial;
    background: #111;
    color: white;
    padding: 20px;
}

input, textarea, select {
    width: 100%;
    margin: 5px 0;
    padding: 10px;
    border-radius: 5px;
    border: none;
}

button {
    padding: 10px;
    margin: 5px 5px 5px 0;
    cursor: pointer;
    border: none;
    border-radius: 5px;
}

button:hover {
    opacity: 0.8;
}

.log {
    background: black;
    padding: 10px;
    height: 150px;
    overflow-y: auto;
}
</style>

</head>

<body>

<h2>iMANSiZ SYSTEMS</h2>

<select id="profileSelect"></select>

<button onclick="newProfile()">➕ Yeni Profil</button>
<button onclick="saveProfile()">💾 Kaydet</button>
<button onclick="deleteProfile()">🗑 Sil</button>

<hr>

<input id="token" placeholder="Bot Token">
<input id="chatId" placeholder="Chat ID">

<textarea id="messages" placeholder="Mesajlar"></textarea>

<input id="delay" type="number" value="3">

<button onclick="startBot()">▶ Start</button>
<button onclick="stopBot()">⛔ Stop</button>

<div class="log" id="logBox"></div>

<script>

let profiles = JSON.parse(localStorage.getItem("profiles") || "{}");

function updateSelect() {
    let select = document.getElementById("profileSelect");
    select.innerHTML = "";

    Object.keys(profiles).forEach(name => {
        let opt = document.createElement("option");
        opt.value = name;
        opt.innerText = name;
        select.appendChild(opt);
    });

    loadProfile(select.value);
}

function newProfile() {
    let name = prompt("Profil adı:");
    if (!name) return;

    profiles[name] = {
        token: "",
        chatId: "",
        messages: "",
        delay: 3
    };

    localStorage.setItem("profiles", JSON.stringify(profiles));
    updateSelect();
}

function saveProfile() {
    let name = document.getElementById("profileSelect").value;

    if (!name) return;

    profiles[name] = {
        token: document.getElementById("token").value,
        chats: document.getElementById("chatId").value,
        messages: document.getElementById("messages").value,
        delay: document.getElementById("delay").value
    };

    localStorage.setItem("profiles", JSON.stringify(profiles));

    alert("Kaydedildi");
}

function deleteProfile() {
    let name = document.getElementById("profileSelect").value;
    delete profiles[name];

    localStorage.setItem("profiles", JSON.stringify(profiles));
    updateSelect();
}

function loadProfile(name) {
    if (!profiles[name]) return;

    let p = profiles[name];

    document.getElementById("token").value = p.token;
    document.getElementById("chatId").value = p.chatId;
    document.getElementById("messages").value = p.messages;
    document.getElementById("delay").value = p.delay;
}

document.getElementById("profileSelect").onchange = function() {
    loadProfile(this.value);
};

async function startBot() {

    await fetch("/api/start", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
            token: document.getElementById("token").value,
            chats: document.getElementById("chatId").value,
            messages: document.getElementById("messages").value,
            delay: document.getElementById("delay").value
        })
    });

}

async function stopBot() {
    await fetch("/api/stop", { method: "POST" });
}

updateSelect();

</script>

</body>
  </html>
