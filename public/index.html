<script>

let profiles = JSON.parse(localStorage.getItem("profiles") || "{}");

function updateSelect() {
    let select = document.getElementById("profileSelect");
    select.innerHTML = "";

    Object.keys(profiles).forEach(name => {
        let opt = document.createElement("option");
        opt.value = name;
        opt.innerText = name;
        select.appendChild(opt);
    });

    if (Object.keys(profiles).length > 0) {
        loadProfile(Object.keys(profiles)[0]);
        select.value = Object.keys(profiles)[0];
    }
}

function newProfile() {
    let name = prompt("Profil adı:");
    if (!name) return;

    profiles[name] = {
        token: "",
        chatId: "",
        messages: "",
        delay: 3
    };

    localStorage.setItem("profiles", JSON.stringify(profiles));
    updateSelect();
}

function saveProfile() {
    let name = document.getElementById("profileSelect").value;
    if (!name) return;

    profiles[name] = {
        token: document.getElementById("token").value,
        chatId: document.getElementById("chatId").value,
        messages: document.getElementById("messages").value,
        delay: document.getElementById("delay").value
    };

    localStorage.setItem("profiles", JSON.stringify(profiles));

    alert("Kaydedildi");
}

function deleteProfile() {
    let name = document.getElementById("profileSelect").value;
    if (!name) return;

    delete profiles[name];

    localStorage.setItem("profiles", JSON.stringify(profiles));
    updateSelect();
}

function loadProfile(name) {
    if (!profiles[name]) return;

    let p = profiles[name];

    document.getElementById("token").value = p.token;
    document.getElementById("chatId").value = p.chatId;
    document.getElementById("messages").value = p.messages;
    document.getElementById("delay").value = p.delay;
}

document.getElementById("profileSelect").onchange = function() {
    loadProfile(this.value);
};

async function startBot() {
    await fetch("/api/start", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
            token: document.getElementById("token").value,
            chatId: document.getElementById("chatId").value,
            messages: document.getElementById("messages").value,
            delay: document.getElementById("delay").value
        })
    });
}

async function stopBot() {
    await fetch("/api/stop", { method: "POST" });
}

updateSelect();

</script>
